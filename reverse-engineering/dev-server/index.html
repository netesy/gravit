<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gravit Designer - Development Environment</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
    }
    
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    
    header {
      background: #2d2d2d;
      padding: 8px 16px;
      border-bottom: 1px solid #3d3d3d;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    header h1 {
      font-size: 16px;
      font-weight: 500;
      color: #7eb36a;
    }
    
    .toolbar {
      display: flex;
      gap: 8px;
    }
    
    .toolbar button {
      background: #3d3d3d;
      border: none;
      color: #e0e0e0;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    
    .toolbar button:hover {
      background: #4d4d4d;
    }
    
    main {
      flex: 1;
      display: flex;
    }
    
    #canvas-container {
      flex: 1;
      background: #252526;
      position: relative;
    }
    
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    #sidebar {
      width: 300px;
      background: #2d2d2d;
      border-left: 1px solid #3d3d3d;
      padding: 16px;
      overflow-y: auto;
    }
    
    #sidebar h2 {
      font-size: 14px;
      color: #7eb36a;
      margin-bottom: 12px;
    }
    
    #console {
      background: #1e1e1e;
      border: 1px solid #3d3d3d;
      border-radius: 4px;
      padding: 8px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      max-height: 200px;
      overflow-y: auto;
      margin-bottom: 16px;
    }
    
    #console .log {
      margin-bottom: 4px;
      padding: 2px 4px;
    }
    
    #console .log.info {
      color: #6a9fb5;
    }
    
    #console .log.success {
      color: #7eb36a;
    }
    
    #console .log.error {
      color: #d44950;
    }
    
    .property-group {
      margin-bottom: 16px;
    }
    
    .property-group label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }
    
    .property-group input,
    .property-group select {
      width: 100%;
      background: #3d3d3d;
      border: 1px solid #4d4d4d;
      color: #e0e0e0;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    
    footer {
      background: #2d2d2d;
      padding: 4px 16px;
      border-top: 1px solid #3d3d3d;
      font-size: 11px;
      color: #888;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>🎨 Gravit Designer - Dev Environment</h1>
      <div class="toolbar">
        <button onclick="runTests()">🧪 Run Tests</button>
        <button onclick="inspectScene()">🔍 Inspect Scene</button>
        <button onclick="clearConsole()">🗑️ Clear Console</button>
      </div>
    </header>
    
    <main>
      <div id="canvas-container">
        <canvas id="canvas"></canvas>
      </div>
      
      <div id="sidebar">
        <h2>Console Output</h2>
        <div id="console">
          <div class="log info">Development environment ready</div>
        </div>
        
        <h2>Scene Inspector</h2>
        <div id="inspector">
          <div class="property-group">
            <label>Document Name</label>
            <input type="text" id="doc-name" value="Untitled">
          </div>
          
          <div class="property-group">
            <label>Canvas Size</label>
            <select id="canvas-size">
              <option value="1920x1080">1920 x 1080</option>
              <option value="1280x720">1280 x 720</option>
              <option value="800x600">800 x 600</option>
            </select>
          </div>
          
          <div class="property-group">
            <label>Current Tool</label>
            <select id="current-tool">
              <option value="select">Select</option>
              <option value="pen">Pen</option>
              <option value="rectangle">Rectangle</option>
              <option value="ellipse">Ellipse</option>
              <option value="text">Text</option>
            </select>
          </div>
        </div>
        
        <h2>Debug Info</h2>
        <div id="debug-info">
          <pre id="debug-output">Loading...</pre>
        </div>
      </div>
    </main>
    
    <footer>
      Gravit Designer Reverse Engineering - Development Build
    </footer>
  </div>
  
  <script>
    // Console logging
    function log(message, type = 'info') {
      const console = document.getElementById('console');
      const entry = document.createElement('div');
      entry.className = `log ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      console.appendChild(entry);
      console.scrollTop = console.scrollHeight;
    }
    
    function clearConsole() {
      document.getElementById('console').innerHTML = '';
      log('Console cleared', 'info');
    }
    
    // Test runner
    function runTests() {
      log('Running tests...', 'info');
      
      // Test GObject
      if (typeof GravitEngine !== 'undefined' && GravitEngine.GObject) {
        log('✓ GObject loaded', 'success');
      } else {
        log('✗ GObject not found', 'error');
      }
      
      // Test GScene
      if (typeof GravitEngine !== 'undefined' && GravitEngine.GScene) {
        log('✓ GScene loaded', 'success');
      } else {
        log('✗ GScene not found', 'error');
      }
      
      // Test GPath
      if (typeof GravitEngine !== 'undefined' && GravitEngine.GPath) {
        log('✓ GPath loaded', 'success');
      } else {
        log('✗ GPath not found', 'error');
      }
      
      log('Tests complete', 'info');
    }
    
    // Scene inspector
    function inspectScene() {
      log('Inspecting scene...', 'info');
      
      const debugOutput = document.getElementById('debug-output');
      
      if (typeof GravitEngine !== 'undefined') {
        const info = {
          'Engine Version': '2.0.0-dev',
          'Available Classes': Object.keys(GravitEngine).length,
          'GObject Type ID': GravitEngine.GObject ? 'Available' : 'Missing',
          'Scene Graph': GravitEngine.GScene ? 'Available' : 'Missing',
        };
        
        debugOutput.textContent = JSON.stringify(info, null, 2);
        log('Scene inspected', 'success');
      } else {
        debugOutput.textContent = 'GravitEngine not loaded';
        log('Engine not loaded', 'error');
      }
    }
    
    // Initialize canvas
    function initCanvas() {
      const canvas = document.getElementById('canvas');
      const container = document.getElementById('canvas-container');
      
      canvas.width = container.offsetWidth;
      canvas.height = container.offsetHeight;
      
      const ctx = canvas.getContext('2d');
      
      // Draw grid
      ctx.fillStyle = '#252526';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;
      
      const gridSize = 20;
      
      for (let x = 0; x < canvas.width; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      
      for (let y = 0; y < canvas.height; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
      
      // Draw center artboard
      const artboardWidth = 800;
      const artboardHeight = 600;
      const artboardX = (canvas.width - artboardWidth) / 2;
      const artboardY = (canvas.height - artboardHeight) / 2;
      
      ctx.fillStyle = '#fff';
      ctx.fillRect(artboardX, artboardY, artboardWidth, artboardHeight);
      
      ctx.strokeStyle = '#7eb36a';
      ctx.lineWidth = 2;
      ctx.strokeRect(artboardX, artboardY, artboardWidth, artboardHeight);
      
      // Draw sample shape
      ctx.fillStyle = '#7eb36a';
      ctx.beginPath();
      ctx.arc(canvas.width / 2, canvas.height / 2, 50, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Window resize handler
    window.addEventListener('resize', initCanvas);
    
    // Initialize on load
    window.addEventListener('load', () => {
      initCanvas();
      log('Canvas initialized', 'success');
      
      // Check if engine is loaded
      setTimeout(() => {
        if (typeof GravitEngine !== 'undefined') {
          log('GravitEngine loaded successfully', 'success');
          inspectScene();
        } else {
          log('GravitEngine not loaded - build may be required', 'info');
        }
      }, 500);
    });
  </script>
</body>
</html>
